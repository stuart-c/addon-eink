name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r addon/app/requirements.txt
          pip install -r addon/app/requirements_test.txt

      - name: Run linting
        run: |
          black --check addon/app
          flake8 addon/app

      - name: Run tests
        run: |
          PYTHONPATH=addon pytest addon/app/tests/
