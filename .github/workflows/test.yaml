name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r eink_layout_manager/app/requirements.txt
          pip install -r eink_layout_manager/app/requirements_test.txt

      - name: Run linting
        run: |
          black --check eink_layout_manager/app
          flake8 eink_layout_manager/app

      - name: Run tests
        run: |
          PYTHONPATH=eink_layout_manager pytest eink_layout_manager/app/tests/
