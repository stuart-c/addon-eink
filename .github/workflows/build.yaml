name: Build

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  version:
    name: Bump Version
    needs: prepare
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Bump Version in config.yaml
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version:.*/version: \"$VERSION\"/" eink_layout_manager/config.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eink_layout_manager/config.yaml
          git commit -m "chore: bump addon version to $VERSION"
          git push origin HEAD:refs/heads/main

  build:
    name: Build Addon (${{ matrix.arch }})
    needs: [prepare, version]
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19
            runs_on: ubuntu-latest
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        uses: home-assistant/builder/actions/build-image@master
        with:
          arch: ${{ matrix.arch }}
          context: eink_layout_manager
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-eink-layout-manager
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          version: ${{ needs.prepare.outputs.version }}
          build-args: BUILD_FROM=${{ matrix.build_from }}
          push: true
          cosign: "false"
          container-registry-username: ${{ github.actor }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Multi-Arch Manifest
    needs: [prepare, build]
    if: always() && (needs.build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@master
        with:
          architectures: '["amd64", "aarch64"]'
          image-name: eink-layout-manager
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
