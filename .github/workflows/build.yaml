name: Build

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    name: Bump Version
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Bump Version in config.yaml
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version:.*/version: \"$VERSION\"/" eink_layout_manager/config.yaml
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eink_layout_manager/config.yaml
          git commit -m "chore: bump addon version to $VERSION"
          git push origin HEAD:refs/heads/main

  prepare:
    name: Prepare Build Matrix
    needs: version
    if: always() && (needs.version.result == 'success' || needs.version.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare multi-arch matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@master
        with:
          architectures: '["amd64", "aarch64"]'

  build:
    name: Build Addon (${{ matrix.arch }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@master
        with:
          arch: ${{ matrix.arch }}
          context: eink_layout_manager
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.arch }}-eink_layout_manager
          image-tags: |
            ${{ github.event.release.tag_name || 'dev' }}
            latest
          version: ${{ github.event.release.tag_name || 'dev' }}
          push: ${{ github.event_name == 'release' }}
          cosign: "false"
          container-registry-username: ${{ github.actor }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Multi-Arch Manifest
    needs: [prepare, build]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@master
        with:
          architectures: ${{ needs.prepare.outputs.matrix }}
          image-name: eink_layout_manager
          image-tags: |
            ${{ github.event.release.tag_name }}
            latest
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
