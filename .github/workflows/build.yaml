name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Prepare Version
    if: 'github.event_name != ''push'' || !contains(github.event.head_commit.message, ''chore: bump addon version'')'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Initialise Version Metadata
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Addon (${{ matrix.arch }})
    needs: prepare
    if: always() && (needs.prepare.result == 'success')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19
            runs_on: ubuntu-latest
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: eink_layout_manager
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/eink-layout-manager/${{ matrix.arch }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/eink-layout-manager/${{ matrix.arch }}:${{ needs.prepare.outputs.tag }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          outputs: ${{ github.event_name != 'pull_request' && 'type=image,compression=zstd,compression-level=9,force-compression=true' || '' }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      # On pull requests the image is not pushed to the registry, so we load it
      # locally on the amd64 runner and export it as an artifact for the E2E job.
      # The GHA build cache means this second build is a near-instant cache hit.
      - name: Load image locally for E2E testing
        if: matrix.arch == 'amd64' && github.event_name == 'pull_request'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: eink_layout_manager
          load: true
          tags: eink-layout-manager:test
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}

      - name: Export image for E2E testing
        if: matrix.arch == 'amd64' && github.event_name == 'pull_request'
        run: docker save eink-layout-manager:test | gzip > /tmp/eink-image.tar.gz

      - name: Upload image artifact for E2E testing
        if: matrix.arch == 'amd64' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eink-docker-image
          path: /tmp/eink-image.tar.gz
          retention-days: 1

  e2e:
    name: E2E Tests
    needs: [prepare, build]
    if: always() && (needs.build.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # On non-PR runs the image was pushed to the registry; pull it directly.
      # This eliminates the need for a second Docker build in the build job.
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull test image from registry
        if: github.event_name != 'pull_request'
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/eink-layout-manager/amd64:${{ needs.prepare.outputs.version }}
          docker tag ghcr.io/${{ github.repository_owner }}/eink-layout-manager/amd64:${{ needs.prepare.outputs.version }} eink-layout-manager:test

      # On PR runs, download the image artifact exported by the build job.
      - name: Download image artifact
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: eink-docker-image
          path: /tmp

      - name: Load image from artifact
        if: github.event_name == 'pull_request'
        run: docker load < /tmp/eink-image.tar.gz

      - name: Start application container
        run: |
          mkdir -p $(pwd)/test_data
          docker run -d \
            -p 8099:8099 \
            --name test-app \
            -v $(pwd)/test_data:/data \
            -e INGRESS_PORT=8099 \
            -e DATA_DIR=/data \
            eink-layout-manager:test

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Cache E2E npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: eink_layout_manager/e2e/node_modules
          key: npm-e2e-${{ runner.os }}-${{ hashFiles('eink_layout_manager/e2e/package-lock.json', 'eink_layout_manager/e2e/package.json') }}
          restore-keys: npm-e2e-${{ runner.os }}-

      - name: Install E2E npm dependencies
        run: npm install
        working-directory: eink_layout_manager/e2e

      - name: Wait for application to start
        run: |
          echo "Waiting for app to start..."
          if ! timeout 60s bash -c 'until curl -s http://localhost:8099/api/ping; do sleep 2; echo "Still waiting..."; done'; then
            echo "App failed to start in time. Container logs:"
            docker logs test-app
            docker inspect test-app
            exit 1
          fi

      - name: Run E2E tests
        run: |
          docker run --rm -t \
            --network host \
            -v $(pwd):/work \
            -w /work \
            -e CI=true \
            -e FORCE_COLOR=1 \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            /bin/bash -c "cd eink_layout_manager/e2e && npx playwright test"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: eink_layout_manager/e2e/playwright-report/
          retention-days: 30

      - name: Stop application container
        if: always()
        run: docker stop test-app || true


  publish:
    name: Publish Multi-Arch Manifest
    needs: [prepare, build, e2e]
    if: always() && (needs.build.result == 'success') && (needs.e2e.result == 'success') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="ghcr.io/${{ github.repository_owner }}/eink-layout-manager"
          
          docker buildx imagetools create \
            --tag ${REPO}:${VERSION} \
            --tag ${REPO}:${TAG} \
            ${REPO}/amd64:${VERSION} \
            ${REPO}/aarch64:${VERSION}

  version:
    name: Bump Version
    needs: [prepare, publish]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update Addon Version and Changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANGELOG="eink_layout_manager/CHANGELOG.md"
          DATE=$(date +'%Y-%m-%d')
          
          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" eink_layout_manager/config.yaml
          
          # Update CHANGELOG.md
          # If the file doesn't exist, we'll create it with a header
          if [ ! -f "$CHANGELOG" ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file.\n" > "$CHANGELOG"
          fi
          
          # Find the line after the header (usually line 3 or 5 depending on initial content)
          # We'll just prepend after the first few lines if they match a pattern, or just prepend to the top if we can't find it.
          # Actually, the user asked for "top of the file". 
          # "Keep a Changelog" usually has a header. Prepending to the absolute top is simpler.
          
          printf "## [%s] - %s\n\n%s\n\n" "$VERSION" "$DATE" "$RELEASE_BODY" > "$CHANGELOG.tmp"
          cat "$CHANGELOG" >> "$CHANGELOG.tmp"
          mv "$CHANGELOG.tmp" "$CHANGELOG"
          
          # Commit changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eink_layout_manager/config.yaml "$CHANGELOG"
          git commit -m "chore: bump addon version to $VERSION and update changelog"
          # Pull latest changes before pushing (safety rebase)
          git pull --rebase origin main
          git push origin HEAD:refs/heads/main
