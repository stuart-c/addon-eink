name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - id: version
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.pull_request.head.sha || github.sha }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build Addon (${{ matrix.arch }})
    needs: prepare
    if: always() && (needs.prepare.result == 'success')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-python:3.12-alpine3.19
            runs_on: ubuntu-latest
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.19
            runs_on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: eink_layout_manager
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/eink-layout-manager/${{ matrix.arch }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/eink-layout-manager/${{ matrix.arch }}:${{ needs.prepare.outputs.tag }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          outputs: type=image,compression=zstd,compression-level=9,force-compression=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  publish:
    name: Publish Multi-Arch Manifest
    needs: [prepare, build]
    if: always() && (needs.build.result == 'success') && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          REPO="ghcr.io/${{ github.repository_owner }}/eink-layout-manager"
          
          docker buildx imagetools create \
            --tag ${REPO}:${VERSION} \
            --tag ${REPO}:${TAG} \
            ${REPO}/amd64:${VERSION} \
            ${REPO}/aarch64:${VERSION}

  version:
    name: Bump Version
    needs: [prepare, publish]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - name: Update Addon Version and Changelog
        env:
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHANGELOG="eink_layout_manager/CHANGELOG.md"
          DATE=$(date +'%Y-%m-%d')
          
          # Update version in config.yaml
          sed -i "s/^version:.*/version: \"$VERSION\"/" eink_layout_manager/config.yaml
          
          # Update CHANGELOG.md
          # If the file doesn't exist, we'll create it with a header
          if [ ! -f "$CHANGELOG" ]; then
            echo -e "# Changelog\n\nAll notable changes to this project will be documented in this file.\n" > "$CHANGELOG"
          fi
          
          # Find the line after the header (usually line 3 or 5 depending on initial content)
          # We'll just prepend after the first few lines if they match a pattern, or just prepend to the top if we can't find it.
          # Actually, the user asked for "top of the file". 
          # "Keep a Changelog" usually has a header. Prepending to the absolute top is simpler.
          
          printf "## [%s] - %s\n\n%s\n\n" "$VERSION" "$DATE" "$RELEASE_BODY" > "$CHANGELOG.tmp"
          cat "$CHANGELOG" >> "$CHANGELOG.tmp"
          mv "$CHANGELOG.tmp" "$CHANGELOG"
          
          # Commit changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eink_layout_manager/config.yaml "$CHANGELOG"
          git commit -m "chore: bump addon version to $VERSION and update changelog"
          # Pull latest changes before pushing (safety rebase)
          git pull --rebase origin main
          git push origin HEAD:refs/heads/main
