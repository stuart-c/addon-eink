name: Cleanup GHCR untagged images

on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 00:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without deleting)'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: read
  packages: write

env:
  # Silence Node.js 20 deprecation warnings by forcing actions to run on Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prune:
    name: Prune Untagged Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - eink-layout-manager
          - eink-layout-manager/amd64
          - eink-layout-manager/aarch64
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prune images
        uses: vlaurin/action-ghcr-prune@0ca88117ed406e99ff396691511c6a267643166f # v0.6.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          container: ${{ matrix.package }}
          prune-untagged: true
          keep-last: 5
          keep-younger-than: 7
          dry-run: ${{ inputs.dry_run || 'true' }}
