name: Cleanup GHCR untagged images

on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 00:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without deleting)'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  prune:
    name: Prune Untagged Images
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prune Untagged Images
        uses: vlaurin/action-ghcr-prune@v0.6.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          container: eink-layout-manager
          prune-untagged: true
          keep-last: 5
          keep-younger-than: 7
          dry-run: ${{ inputs.dry_run || 'true' }}
