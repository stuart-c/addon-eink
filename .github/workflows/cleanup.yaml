name: Cleanup GHCR untagged images

on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 00:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without deleting)'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: read
  packages: write

env:
  # Silence Node.js 20 deprecation warnings by forcing actions to run on Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prune:
    name: Prune Untagged Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - addon-eink
          - addon-eink/amd64
          - addon-eink/aarch64
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prune images
        uses: vlaurin/action-ghcr-prune@0cf7d39f88546edd31965acba78cdcb0be14d641 # v0.6.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          container: ${{ matrix.package }}
          prune-untagged: true
          keep-last: 5
          keep-younger-than: 7
          dry-run: ${{ inputs.dry_run || 'true' }}
