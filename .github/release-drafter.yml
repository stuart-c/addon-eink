name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    label: 'chore'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
  default: patch
template: |
  ## Changes

  $CHANGES
autolabeler:
  - label: 'feature'
    title:
      - '/^feat:/i'
    branch:
      - '/^feature\//i'
      - '/^feat\//i'
  - label: 'fix'
    title:
      - '/^fix:/i'
    branch:
      - '/^fix\//i'
      - '/^bugfix\//i'
  - label: 'chore'
    title:
      - '/^chore:/i'
      - '/^ci:/i'
      - '/^test:/i'
      - '/^refactor:/i'
      - '/^docs:/i'
