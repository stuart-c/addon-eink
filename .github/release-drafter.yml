name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
  default: patch
template: |
  ## Changes

  $CHANGES
autolabeler:
  - label: 'feature'
    title:
      - '^feat:'
      - 'feature'
      - 'enhancement'
    branch:
      - '^feature/'
      - '^feat/'
      - '^enhancement/'

  - label: 'fix'
    title:
      - '^fix:'
      - 'bugfix'
      - '\bfix\b'
    branch:
      - '^fix/'
      - '^bugfix/'

  - label: 'chore'
    title:
      - '^chore:'
      - '^ci:'
      - '^test:'
      - '^refactor:'
      - '^docs:'
    branch:
      - '^chore/'
      - '^ci/'
      - '^test/'
      - '^refactor/'
      - '^docs/'

